<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c04;--bg2:#0c1008;--bg3:#111808;--bg4:#162010;
  --green:#7dc843;--green-dim:#4a7a28;--green-muted:#2a4a14;
  --text:#c8d8a0;--text-dim:#8aaa60;--text-faint:#4a6a2a;
  --border:#1e2e10;--border2:#2a3e18;--red:#c0392b;--amber:#c8a020;
  --font:'Courier New',Courier,monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:13px;line-height:1.6}

/* HEADER */
header{
  background:var(--bg2);border-bottom:2px solid var(--border2);
  padding:18px 28px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:100;
}
.logo-block{flex:1}
.logo{font-size:20px;font-weight:700;color:var(--green);letter-spacing:5px}
.logo-sub{font-size:9px;color:var(--text-faint);letter-spacing:3px;margin-top:3px}
.stamp{
  font-size:10px;font-weight:700;color:var(--red);
  border:2px solid var(--red);padding:5px 11px;
  letter-spacing:3px;transform:rotate(-4deg);opacity:.85;flex-shrink:0;
}
.file-count-badge{
  background:var(--green-muted);color:var(--green);
  font-size:10px;letter-spacing:2px;padding:5px 12px;
  border:1px solid var(--green-dim);flex-shrink:0;
}

/* STATUS BAR */
.status-bar{
  background:var(--bg);border-bottom:1px solid var(--border);
  padding:6px 28px;display:flex;align-items:center;gap:10px;
  font-size:9px;color:var(--amber);letter-spacing:2px;
  min-height:28px;
}
.pulse{width:7px;height:7px;background:var(--amber);border-radius:50%;flex-shrink:0;animation:pulse 1.2s ease-in-out infinite}
.pulse.done{background:var(--green);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}
#statusText{flex:1}
.progress-bar-wrap{width:120px;height:4px;background:var(--bg4);border:1px solid var(--border);overflow:hidden}
.progress-bar-fill{height:100%;background:var(--amber);transition:width .4s ease}
.progress-bar-fill.done{background:var(--green)}

/* CONTROLS */
.controls{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:12px 28px;display:flex;flex-direction:column;gap:10px;
}
.search-row{
  display:flex;align-items:center;gap:10px;
  background:var(--bg3);border:1px solid var(--border2);padding:9px 14px;
}
.search-icon{color:var(--green-dim);font-size:16px;flex-shrink:0}
#searchInput{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--font);font-size:12px;letter-spacing:1px;
}
#searchInput::placeholder{color:var(--text-faint)}
.clear-btn{
  background:none;border:none;color:var(--text-faint);
  cursor:pointer;font-size:14px;display:none;font-family:var(--font);padding:0;
}
.clear-btn.vis{display:block}.clear-btn:hover{color:var(--red)}
.cats{display:flex;gap:6px;flex-wrap:wrap}
.cat-btn{
  font-size:8px;letter-spacing:2px;padding:4px 12px;
  border:1px solid var(--border2);background:transparent;
  color:var(--text-faint);cursor:pointer;font-family:var(--font);transition:all .15s;
}
.cat-btn:hover{border-color:var(--green-dim);color:var(--text-dim)}
.cat-btn.active{border-color:var(--green);color:var(--green);background:var(--green-muted)}
.sort-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.sort-label{font-size:9px;color:var(--text-faint);letter-spacing:2px}
.sort-btn{
  font-size:10px;font-family:var(--font);color:var(--text-faint);
  background:transparent;border:none;cursor:pointer;letter-spacing:1px;transition:color .15s;padding:2px 0;
}
.sort-btn:hover{color:var(--text-dim)}.sort-btn.active{color:var(--green);text-decoration:underline}
.result-count{margin-left:auto;font-size:9px;color:var(--text-faint);letter-spacing:1px}

/* STATS ROW */
.stats-row{
  display:flex;gap:12px;flex-wrap:wrap;padding:10px 28px;
  background:var(--bg);border-bottom:1px solid var(--border);
}
.stat-pill{
  font-size:8px;letter-spacing:2px;padding:4px 10px;
  border:1px solid var(--border2);color:var(--text-faint);
}
.stat-pill span{color:var(--green);font-weight:700}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:20px 28px 80px}
.theory-list{display:flex;flex-direction:column;gap:8px}

/* CARDS */
.card{
  background:var(--bg2);border:1px solid var(--border);
  cursor:pointer;transition:border-color .15s,background .15s;overflow:hidden;
}
.card:hover{border-color:var(--border2);background:var(--bg3)}
.card.open{border-color:var(--green-dim);background:var(--bg3)}
.card-header{padding:14px 18px;display:flex;align-items:flex-start;gap:14px}
.card-main{flex:1;min-width:0}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.cat-badge{font-size:7px;letter-spacing:2px;padding:2px 7px;font-weight:700;flex-shrink:0}
.year-tag{font-size:8px;color:var(--text-faint);letter-spacing:2px}
.wiki-tag{font-size:7px;color:var(--text-faint);letter-spacing:1px;opacity:.6}
.card-title{font-size:14px;font-weight:700;color:#daeaaa;letter-spacing:.5px;line-height:1.4}
.card-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:7px}
.meter-group{display:flex;align-items:center;gap:7px}
.meter-label{font-size:7px;color:var(--text-faint);letter-spacing:2px}
.meter-bar{width:90px;height:5px;background:var(--bg4);border:1px solid var(--border);overflow:hidden}
.meter-fill{height:100%;transition:width .5s ease}
.meter-score{font-size:10px;font-weight:700;letter-spacing:1px;min-width:75px}
.chevron{
  color:var(--green-dim);font-size:13px;flex-shrink:0;
  margin-top:3px;transition:transform .2s;user-select:none;
}
.card.open .chevron{transform:rotate(90deg)}

/* EXPANDED */
.card-body{
  display:none;padding:0 18px 16px;
  border-top:1px solid var(--border);margin:0 18px;
}
.card.open .card-body{display:block}
.card-desc{
  font-size:12px;color:#9ab870;line-height:1.85;
  padding:14px 0 12px;border-bottom:1px solid var(--border);margin-bottom:12px;
}
.sources-head{
  font-size:8px;letter-spacing:3px;color:var(--text-faint);
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.sources-head::after{content:'';flex:1;height:1px;background:var(--border)}
.source-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
.source-bullet{color:var(--green);flex-shrink:0;margin-top:2px;font-size:10px}
.source-text{font-size:11px;color:var(--text-dim);line-height:1.5}
.source-link{
  color:var(--green);text-decoration:none;font-size:10px;
  letter-spacing:1px;margin-left:6px;white-space:nowrap;
  cursor:pointer;
}
.source-link:hover{text-decoration:underline}
.wiki-read-link{
  display:inline-flex;align-items:center;gap:5px;
  color:var(--green);text-decoration:none;font-size:9px;
  letter-spacing:1px;margin-top:10px;border:1px solid var(--green-dim);
  padding:4px 10px;transition:background .15s;cursor:pointer;
}
.wiki-read-link:hover{background:var(--green-muted)}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:12px}
.tag{font-size:7px;letter-spacing:1.5px;padding:2px 8px;border:1px solid var(--border2);color:var(--text-faint)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text-faint);letter-spacing:3px;font-size:11px}
.empty-icon{font-size:34px;margin-bottom:14px;display:block}

/* LOAD MORE */
.load-more-wrap{text-align:center;margin-top:20px}
.load-more-btn{
  padding:12px 30px;background:transparent;
  border:1px solid var(--border2);color:var(--text-faint);
  font-family:var(--font);font-size:9px;letter-spacing:3px;
  cursor:pointer;transition:all .15s;
}
.load-more-btn:hover{border-color:var(--green-dim);color:var(--green)}
.load-more-btn:disabled{opacity:.35;cursor:not-allowed}

/* FOOTER */
footer{
  border-top:1px solid var(--border);padding:14px 28px;
  display:flex;justify-content:space-between;align-items:center;
  background:var(--bg2);font-size:8px;color:var(--text-faint);
  letter-spacing:2px;flex-wrap:wrap;gap:6px;
}
.footer-dot{color:var(--green-dim);margin:0 6px}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2)}

/* RESPONSIVE */
@media(max-width:640px){
  header{padding:14px 16px}
  .controls,.stats-row{padding:10px 16px}
  .status-bar{padding:6px 16px}
  main{padding:14px 16px 60px}
  .meter-bar{width:60px}
  .card-header{padding:12px 14px}
  .card-body{margin:0 14px;padding:0 0 12px}
  footer{padding:10px 16px;flex-direction:column;text-align:center}
  .logo{font-size:16px;letter-spacing:3px}
}
</style>

/* ─────────────────────────────────────────
   AUTO-ANALYSIS HELPERS
───────────────────────────────────────── */
const CAT_KW={
  Government:["cia","fbi","nsa","government","congress","senate","president","federal","operation","project","white house","pentagon","intelligence","covert","clandestine","agency","bureau"],
  Military:["military","army","navy","war","combat","weapon","missile","bomb","soldier","air force","nuclear","nato","troops","attack","operation","battalion","regiment","fleet"],
  Surveillance:["surveillance","monitor","intercept","spy","wiretap","prism","nsa","signal","tracking","data collect","eavesdrop","echelon","gchq","sigint","humint","watch list"],
  Medical:["medical","health","experiment","drug","disease","vaccine","hospital","doctor","clinical","pharma","treatment","cancer","patient","trial","radiation","chemical","biological"],
  Corporate:["corporate","company","tobacco","oil","bank","wall street","pharmaceutical","industry","business","financial","exxon","enron","settlement","fraud","executive","profit"],
  Technology:["technology","internet","data","software","computer","algorithm","social media","facebook","google","twitter","tech","silicon valley","encryption","cyber","digital","app"],
  Historical:["assassination","jfk","mlk","lincoln","watergate","scandal","cold war","wwii","vietnam","korea","coverup","1960","1970","1950","1940","1930","1920","century","historic"],
  Science:["ufo","alien","space","nasa","moon","chemtrail","haarp","weather","climate","flat earth","area 51","extraterrestrial","phenomenon","anomaly","radiation","atmospheric"],
  Political:["political","election","vote","party","republican","democrat","campaign","lobbying","corruption","politician","congress","senate","parliament","regime","coup","propaganda"],
  Financial:["federal reserve","banking","gold","currency","rothschild","bilderberg","illuminati","new world order","economy","hedge fund","derivatives","reserve","treasury","monetary"]
};

function guessCategory(title,extract){
  const text=(title+' '+(extract||'')).toLowerCase();
  let best='Other',bestScore=0;
  for(const[cat,kws] of Object.entries(CAT_KW)){
    const score=kws.filter(k=>text.includes(k)).length;
    if(score>bestScore){bestScore=score;best=cat}
  }
  return best;
}
function guessYear(extract){
  if(!extract)return null;
  const m=extract.match(/\b(19[0-9]{2}|20[0-2][0-9])\b/);
  return m?parseInt(m[1]):null;
}
function guessCredibility(title,extract){
  const text=(title+' '+(extract||'')).toLowerCase();
  if(/\bconfirmed\b|\bproven\b|\bdeclassified\b|\badmitted\b|\backnowledged\b|\bsentenced\b|\bconvicted\b/.test(text))
    return 85+Math.floor(Math.random()*14);
  if(/\ballege[sd]?\b|\bclaim[sed]?\b|\bsuggest[s]?\b|\breportedly\b|\bdisputed\b|\bunproven\b/.test(text))
    return 45+Math.floor(Math.random()*25);
  if(/\bconspiracy theory\b|\bdebunked\b|\bfalse\b|\bmyth\b/.test(text))
    return 20+Math.floor(Math.random()*35);
  return 60+Math.floor(Math.random()*20);
}
function guessTags(title,extract){
  const text=(title+' '+(extract||'')).toLowerCase();
  const tags=[];
  if(/\bcia\b/.test(text))tags.push('CIA');
  if(/\bfbi\b/.test(text))tags.push('FBI');
  if(/\bnsa\b/.test(text))tags.push('NSA');
  if(/cold war/.test(text))tags.push('Cold War');
  if(/\bconfirmed\b|\bproven\b|\bdeclassified\b/.test(text))tags.push('Confirmed');
  if(/\bdisputed\b|\balleg/.test(text))tags.push('Disputed');
  if(/surveillance/.test(text))tags.push('Surveillance');
  if(/\bmilitary\b|\barmy\b|\bnavy\b/.test(text))tags.push('Military');
  if(/medical|health|experiment/.test(text))tags.push('Medical');
  if(/corporate|company|industry/.test(text))tags.push('Corporate');
  if(/false flag/.test(text))tags.push('False Flag');
  if(/assassination/.test(text))tags.push('Assassination');
  if(/nuclear/.test(text))tags.push('Nuclear');
  if(/\bufo\b|\balien\b/.test(text))tags.push('UFO');
  if(/\bfoia\b/.test(text))tags.push('FOIA');
  if(/\bsurveillance\b|\bspy\b|\bintercept\b/.test(text))tags.push('Spying');
  return [...new Set(tags)].slice(0,5);
}

/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
let allTheories=[...SEEDED];
let wikiQueue=[...WIKI_QUEUE];
let activeCat="All",sortMode="cred",expanded=null,query="";
let fetchingDone=false;
const BATCH_SIZE=10;
const seededSlugs=new Set(SEEDED.map(s=>s.wikiSlug.toLowerCase().replace(/_/g,' ')));

/* ─────────────────────────────────────────
   WIKIPEDIA FETCHER
───────────────────────────────────────── */
async function fetchBatch(slugs){
  const titles=slugs.map(s=>s.replace(/_/g,' ')).join('|');
  const url=`https://en.wikipedia.org/w/api.php?`+
    `action=query&titles=${encodeURIComponent(titles)}&prop=extracts&`+
    `exintro=true&explaintext=true&exsentences=5&format=json&origin=*&redirects=1`;
  try{
    const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return[];
    const d=await r.json();
    const pages=Object.values(d.query.pages);
    return pages
      .filter(p=>p.extract&&p.extract.length>80&&!p.missing&&!p.invalid)
      .map(p=>{
        const slug=p.title.replace(/ /g,'_');
        const ex=p.extract||'';
        const cat=guessCategory(p.title,ex);
        const year=guessYear(ex);
        const cred=guessCredibility(p.title,ex);
        const tags=guessTags(p.title,ex);
        const desc=ex.length>700?ex.slice(0,700)+'…':ex;
        return{
          id:'w_'+p.pageid,title:p.title,cat,year,credibility:cred,
          wikiSlug:slug,desc,sources:[],tags,fromWiki:true
        };
      });
  }catch(e){return[]}
}

async function loadNextBatch(){
  if(wikiQueue.length===0){
    setFetchDone();return;
  }
  const btn=document.getElementById('loadMoreBtn');
  if(btn){btn.disabled=true;btn.textContent='[ DECRYPTING... ]'}

  const batch=wikiQueue.splice(0,BATCH_SIZE);
  const total=WIKI_QUEUE.length;
  const done=total-wikiQueue.length-batch.length;
  setStatus(`DECRYPTING FILES... ${done}/${total} PROCESSED`,Math.round(done/total*100));

  const results=await fetchBatch(batch);
  const existingTitles=new Set(allTheories.map(t=>t.title.toLowerCase()));
  const novel=results.filter(r=>{
    const tl=r.title.toLowerCase();
    if(existingTitles.has(tl))return false;
    if(seededSlugs.has(tl))return false;
    return true;
  });
  novel.forEach(n=>existingTitles.add(n.title.toLowerCase()));
  allTheories=[...allTheories,...novel];

  const processed=total-wikiQueue.length;
  const pct=Math.round(processed/total*100);
  setStatus(`DECRYPTING FILES... ${processed}/${total} PROCESSED (${allTheories.length} FILES ACTIVE)`,pct);
  render();

  if(wikiQueue.length>0){
    if(btn){btn.disabled=false;btn.textContent='[ DECRYPT MORE FILES ↓ ]'}
    document.getElementById('loadMoreWrap').style.display='block';
    setTimeout(()=>loadNextBatch(),400);
  }else{
    setFetchDone();
  }
}

function setFetchDone(){
  fetchingDone=true;
  document.getElementById('loadMoreWrap').style.display='none';
  const p=document.getElementById('pulseEl');
  p.className='pulse done';
  setStatus(`✓ ARCHIVE COMPLETE — ${allTheories.length} FILES LOADED`,100,true);
  render();
}

function setStatus(msg,pct=0,done=false){
  document.getElementById('statusText').textContent=msg;
  const fill=document.getElementById('progressFill');
  fill.style.width=pct+'%';
  if(done)fill.className='progress-bar-fill done';
}

/* ─────────────────────────────────────────
   UI
───────────────────────────────────────── */
function meterColor(v){return v>=85?'#7dc843':v>=60?'#c8a020':'#c0392b'}
function credLabel(v){return v>=90?'CONFIRMED':v>=75?'HIGH CONF.':v>=50?'MODERATE':'DISPUTED'}

function buildCatBar(){
  const counts={All:allTheories.length};
  CATS.slice(1).forEach(c=>{counts[c]=allTheories.filter(t=>t.cat===c).length});
  document.getElementById('catBar').innerHTML=CATS
    .filter(c=>c==='All'||counts[c]>0)
    .map(c=>`<button class="cat-btn${activeCat===c?' active':''}" onclick="setCat('${c}')">
      ${c.toUpperCase()} <span style="opacity:.5;font-size:7px">(${counts[c]})</span>
    </button>`).join('');
}

function buildStats(){
  const confirmed=allTheories.filter(t=>t.credibility>=90).length;
  const disputed=allTheories.filter(t=>t.credibility<50).length;
  const wiki=allTheories.filter(t=>t.fromWiki).length;
  const seeded=allTheories.filter(t=>t.seeded).length;
  document.getElementById('statsRow').innerHTML=[
    `TOTAL FILES: <span>${allTheories.length}</span>`,
    `CONFIRMED: <span>${confirmed}</span>`,
    `DISPUTED: <span>${disputed}</span>`,
    `CURATED: <span>${seeded}</span>`,
    `WIKI-SOURCED: <span>${wiki}</span>`,
    `CATEGORIES: <span>${CATS.slice(1).filter(c=>allTheories.some(t=>t.cat===c)).length}</span>`
  ].map(s=>`<div class="stat-pill">${s}</div>`).join('');
}

function setCat(c){activeCat=c;expanded=null;render()}
function setSort(s){
  sortMode=s;
  ['cred','year','alpha'].forEach(x=>{
    document.getElementById('sort'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active',x===s);
  });
  render();
}
function onSearch(){
  query=document.getElementById('searchInput').value.toLowerCase();
  document.getElementById('clearBtn').className='clear-btn'+(query?' vis':'');
  expanded=null;render();
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  query='';document.getElementById('clearBtn').className='clear-btn';render();
}
function toggle(id){expanded=expanded===id?null:id;render()}

function render(){
  buildCatBar();buildStats();
  let filtered=allTheories.filter(t=>{
    const catOk=activeCat==='All'||t.cat===activeCat;
    const qOk=!query||
      t.title.toLowerCase().includes(query)||
      (t.desc||'').toLowerCase().includes(query)||
      (t.tags||[]).some(tag=>tag.toLowerCase().includes(query));
    return catOk&&qOk;
  });

  if(sortMode==='cred')filtered.sort((a,b)=>b.credibility-a.credibility);
  else if(sortMode==='year')filtered.sort((a,b)=>(a.year||9999)-(b.year||9999));
  else filtered.sort((a,b)=>a.title.localeCompare(b.title));

  document.getElementById('resultCount').textContent=
    `${filtered.length} FILE${filtered.length!==1?'S':''} FOUND`;
  document.getElementById('totalBadge').textContent=`${allTheories.length} FILES`;

  const list=document.getElementById('theoryList');
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><span class="empty-icon">⊘</span>[ NO MATCHING FILES IN DATABASE ]<br><br>REFINE SEARCH OR CLEAR FILTERS</div>`;
    return;
  }

  list.innerHTML=filtered.map(t=>{
    const cc=CAT_COLORS[t.cat]||CAT_COLORS.Other;
    const isOpen=expanded===t.id;
    const mc=meterColor(t.credibility);
    const wikiUrl=`https://en.wikipedia.org/wiki/${t.wikiSlug||t.title.replace(/ /g,'_')}`;
    return `<div class="card${isOpen?' open':''}" onclick="toggle('${t.id}')">
      <div class="card-header">
        <div class="card-main">
          <div class="card-top">
            <span class="cat-badge" style="background:${cc.bg};border:1px solid ${cc.border};color:${cc.text}">${t.cat.toUpperCase()}</span>
            ${t.year?`<span class="year-tag">EST. ${t.year}</span>`:''}
            ${t.seeded?`<span style="font-size:7px;color:var(--green-dim);letter-spacing:1px">★ CURATED</span>`:''}
            ${t.fromWiki?`<span class="wiki-tag">◈ WIKI</span>`:''}
          </div>
          <div class="card-title">${t.title}</div>
          <div class="card-meta">
            <div class="meter-group">
              <span class="meter-label">CREDIBILITY</span>
              <div class="meter-bar"><div class="meter-fill" style="width:${t.credibility}%;background:${mc}"></div></div>
              <span class="meter-score" style="color:${mc}">${credLabel(t.credibility)} (${t.credibility}%)</span>
            </div>
          </div>
        </div>
        <span class="chevron">▶</span>
      </div>
      ${isOpen?`<div class="card-body" onclick="event.stopPropagation()">
        <p class="card-desc">${(t.desc||'No description available.').replace(/</g,'&lt;')}</p>
        ${t.sources&&t.sources.length?`
          <div class="sources-head">PRIMARY SOURCES</div>
          ${t.sources.map(s=>`<div class="source-item">
            <span class="source-bullet">▣</span>
            <span class="source-text">${s.text}
              <span class="source-link" onclick="event.stopPropagation();window.open('${s.url}','_blank')">OPEN ↗</span>
            </span>
          </div>`).join('')}`:''}
        <span class="wiki-read-link" onclick="event.stopPropagation();window.open('${wikiUrl}','_blank')">◈ READ FULL WIKIPEDIA ARTICLE ↗</span>
        <div class="tags">${(t.tags||[]).map(tag=>`<span class="tag">${tag}</span>`).join('')}</div>
      </div>`:''}
    </div>`;
  }).join('');
}

/* ─────────────────────────────────────────
   BOOT
───────────────────────────────────────── */
render();
loadNextBatch();
</script>
